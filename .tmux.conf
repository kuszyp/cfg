# Improve colors
set -g default-terminal 'screen-256color'

# Set scrollback buffer
set -g history-limit 5000000

# Customize the status line
# set -g status-fg  green
# set -g status-bg  black

# Scroll
set -g mouse on

# Change default prefix to Ctrl+a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Change keybindings for splitting windows
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

# Refresh tmux config by 'Ctrl+a' and then 'r'
unbind r
bind r source-file ~/.tmux.conf

# Resize panels
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Maximize and minimize pane
bind -r m resize-pane -Z

# Setup vim movements for tmux's copy mode
set-window-option -g mode-keys vi

# start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection

# copy text with "y"
bind-key -T copy-mode-vi 'y' send -X copy-selection

# don't exit copy mode after dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane 

# List of plugins
set -g @plugin '~/.tmux/plugins/tpm'
set -g @plugin '~/.tmux/plugins/tmux-sensible'
# persist tmux sessions after computer restart
set -g @plugin '~/.tmux/plugins/tmux-resurrect'


# for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'christoomey/vim-tmux-navigator'

# THEME
#set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'dracula/tmux'

# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, ssh-session, attached-clients, network-vpn, weather, time, mpc, spotify-tui, playerctl, kubernetes-context, synchronize-panes
set -g @dracula-plugins "git battery cpu-usage ram-usage"

set -g @dracula-show-flags true

# it can accept `hostname` (full hostname), `session`, `shortname` (short name), `smiley`, `window`, or any character.
set -g @dracula-show-left-icon session

set -g @dracula-show-empty-plugins false

# automatically saves sessions for you every 15 minutes
set -g @plugin '~/.tmux/plugins/tmux-continuum'

# use this theme for tmux
set -g @themepack 'powerline/default/cyan'

# allow tmux-ressurect to capture pane contents
set -g @resurrect-capture-pane-contents 'on'

# enable tmux-continuum functionality
set -g @continuum-restore 'on'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
#run '~/.tmux/plugins/tpm/tpm'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
